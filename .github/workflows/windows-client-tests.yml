name: Windows Client Tests (Disabled — switching to SEB)

on:
  push:
    paths:
      - "windows-client/**"
      - ".github/workflows/windows-client-tests.yml"
  pull_request:
    paths:
      - "windows-client/**"
  workflow_dispatch: {}

jobs:
  test:
    if: false # Disabled: switching from Windows client to SEB. Remove this line to re-enable.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore windows-client/WindowsClient.sln

      - name: Build
        run: dotnet build windows-client/WindowsClient.sln --no-restore --configuration Debug

      - name: Test
        run: dotnet test windows-client/WindowsClient.sln --no-build --configuration Debug --verbosity normal
